<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Note You Needed Today</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f7f1e8;
      --fg:#3d2b1a;
      --muted:#7a6550;
      --border:#d5c8b5;
      --radius:0.75rem;
    }
    html,body{
      height:100%;
      background:var(--bg);
      color:var(--fg);
      font-family:Georgia,"Times New Roman",serif;
    }
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:1.5rem;
      min-height:100dvh;
    }
    main{
      max-width:28rem;
      width:100%;
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:2rem 1.75rem;
      background:#fff9f2;
      box-shadow:0 2px 8px rgba(61,43,26,.06);
      text-align:center;
    }
    .label{
      font-size:.7rem;
      font-family:"Courier New",monospace;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:1.25rem;
      display:block;
    }
    h1{
      font-size:1.9rem;
      line-height:1.15;
      font-weight:500;
      margin-bottom:1rem;
    }
    p{
      font-size:.95rem;
      line-height:1.7;
      color:var(--muted);
      margin-bottom:1.75rem;
    }
    button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:.65rem 1.5rem;
      border:1px solid var(--border);
      border-radius:2rem;
      background:var(--bg);
      color:var(--fg);
      font-size:.9rem;
      font-family:inherit;
      cursor:pointer;
    }
    button:hover{background:#ede5d8}
  </style>
</head>
<body>
  <main>
    <span class="label">The Note You Needed Today</span>
    <h1>You seem to be offline.</h1>
    <p>The Note will be here when your connection returns.</p>
    <button onclick="window.location.reload()">Try again</button>
  </main>
</body>
</html>
